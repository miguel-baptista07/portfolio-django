{% extends "portfolio/base.html" %}

{% block content %}
<h2>Editar Artigo: {{ artigo.titulo }}</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar</button>
</form>

<p><a href="{% url 'artigo' artigo.id %}">Voltar ao artigo</a></p>
{% endblock %}
